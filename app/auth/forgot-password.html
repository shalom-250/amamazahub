<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | amamazahub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-sm bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Forgot Password</h2>
        <form id="forgotForm" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <span id="emailError" class="text-red-500 text-xs hidden"></span>
            </div>
            <div class="btn-container">
                <button type="submit"
                                class="w-full py-2 px-4 bg-blue-600 text-white font-semibold rounded hover:bg-blue-700 transition duration-200">
                                Send Reset Link
                </button>
            </div>
            
            <div id="forgotError" class="text-red-500 text-sm text-center hidden"></div>
            <div id="forgotSuccess" class="text-green-500 text-sm text-center hidden"></div>
        </form>
        <div class="mt-6 flex flex-col items-center space-y-2">
            <a href="@login" class="text-blue-600 hover:underline text-sm">Back to Login</a>
        </div>
    </div>
    <script>
        // Form validation and AJAX forgot password
        $('#forgotForm').on('submit', function (e) {
            e.preventDefault();
            $('.btn-container').html(`
                <button disabled type="button" class="py-2.5 px-5 me-2 text-sm font-medium text-gray-900 bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-2 focus:ring-blue-700 focus:text-blue-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700 inline-flex w-full items-center justify-center">
                <svg aria-hidden="true" role="status" class="inline w-4 h-4 me-3 text-gray-200 animate-spin dark:text-gray-600" viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z" fill="currentColor"/>
                <path d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z" fill="#1C64F2"/>
                </svg>
                Loading...
                </button>
`);
            let valid = true;
            $('#emailError, #forgotError, #forgotSuccess').addClass('hidden').text('');

            const email = $('#email').val().trim();

            if (email === '') {
                $('#emailError').text('Email is required.').removeClass('hidden');
                valid = false;
            } else if (!/^\S+@\S+\.\S+$/.test(email)) {
                $('#emailError').text('Invalid email format.').removeClass('hidden');
                valid = false;
            }

            if (!valid) return;

            $.ajax({
                url: '@auth/action', // Change to your actual forgot password handler
                type: 'POST',
                data: { email, action:'forgot' },
                dataType: 'json',
                success: function (response) {
                    if (response.success) {
                        $('#forgotSuccess').text(response.message || 'Reset link sent to your email.').removeClass('hidden');
                    } else {
                        $('#forgotError').text(response.message || 'Failed to send reset link.').removeClass('hidden');
                    }
                    $('.btn-container').html(`
                    <button type="submit"
                            class="w-full py-2 px-4 bg-blue-600 text-white font-semibold rounded hover:bg-blue-700 transition duration-200">
                            Send Reset Link
                    </button>
                    `);
                },
                error: function (xhr) {
                    alert(JSON.stringify(xhr));
                    $('#forgotError').text('Server error. Please try again later.').removeClass('hidden');
                }
            });
        });
    </script>
</body>
</html>
